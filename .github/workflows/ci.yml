name: CI Pipeline - Zadanie 2

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  # Nazwa obrazu na GHCR (GitHub Container Registry wymaga małych liter)
  IMAGE_NAME_GHCR: ${{ github.repository_owner }}/aplikacja-pogodowa
  # Nazwa repozytorium cache na DockerHub
  CACHE_IMAGE_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/aplikacja-pogodowa-cache

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Cache to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false 
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE_DOCKERHUB }}:cache
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE_DOCKERHUB }}:cache,mode=max

      - name: Build local image for CVE scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true 
          tags: lokalny-obraz:test
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE_DOCKERHUB }}:cache

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'lokalny-obraz:test'
          format: 'table'
          exit-code: '1' # Kod błędu '1' natychmiast zatrzymuje pipeline (Fail)
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Push Multi-Platform Image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE_DOCKERHUB }}:cache